<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
	<head>
	    <title>Registrazione - SIWTornei</title>
	    <link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	
	<body>
	
	    <div class="top-bar">
	        <div class="top-bar-right">
	            <a th:href="@{/login}" class="login-link">Accedi</a>
	        </div>
	    </div>
	
	    <main class="main-content">
	        <div class="logo-container">
	            <div class="logo-placeholder">Registrazione</div>
	        </div>
	
	        <form th:action="@{/register}" method="post" class="stadium-form">
	            
	            <!-- Sotto-sezione Anagrafica -->
	            <h3 class="section-title font-size-md margin-bottom-md">Dati Anagrafici</h3>
	            
	            <div class="form-group">
	                <label>Nome</label>
	                <input type="text" th:name="nome" th:value="${utente.nome}" placeholder="Es: Mario" required />
	            </div>
	
	            <div class="form-group">
	                <label>Cognome</label>
	                <input type="text" th:name="cognome" th:value="${utente.cognome}" placeholder="Es: Rossi" required />
	            </div>
				
				<div class="form-group">
					<label>Email</label>
					<input type="text" th:name="email" th:value="${utente.email}" placeholder="Es: mrossi@email.com" required />
				</div>
	
	            <!-- Sotto-sezione Credenziali -->
	            <h3 class="section-title font-size-md margin-top-xl margin-bottom-md">Dati di Accesso</h3>
	
	            <div class="form-group">
	                <label>Scegli Username</label>
	                <input type="text" th:name="username" th:value="${credentials.username}" placeholder="Es: mario_rossi" required />
	            </div>
	
	            <div class="form-group">
	                <label>Scegli Password</label>
	                <input type="password" th:name="password" th:value="${credentials.password}" placeholder="Crea una password sicura" required />
	            </div>
	
	            <div class="margin-top-lg">
	                <button type="submit" class="main-link">Conferma Registrazione</button>
	            </div>
	        </form>
	
	        <div class="margin-top-lg">
	            <p class="welcome-text font-size-md">
	                Hai già un account? <a th:href="@{/login}" class="action-link-view">Accedi qui</a>
	            </p>
	            <a th:href="@{/tornei}" class="back-link">← Torna alla lista dei tornei</a>
	        </div>
	    </main>
	
	</body>
</html>
