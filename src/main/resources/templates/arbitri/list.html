<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Elenco Arbitri - SIWTornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-right">
            <span sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="login-link">Accedi</a>
            </span>
            <span sec:authorize="isAuthenticated()" class="user-menu">
                <span class="welcome-user">Ciao, <strong sec:authentication="name">Utente</strong>!</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </span>
        </div>
    </div>

    <a th:href="@{/}" class="logo-wrapper">
        <img th:src="@{/images/logo.jpg}" alt="SIW Tornei Logo" class="logo-img">
    </a>

    <main class="main-content">

        <div>
            <div class="title-box">Classe Arbitrale</div>
        </div>
			
        <!-- Pulsante visibile solo all'ADMIN per registrare -->
        <div sec:authorize="hasAuthority('ADMIN')" class="margin-bottom-lg">
            <a th:href="@{/admin/arbitro/new}" class="main-link admin-btn">Registra Nuovo Arbitro</a>
        </div>

        <!-- Messaggio Lista Vuota -->
        <div th:if="${#lists.isEmpty(arbitri)}" class="no-data-msg">
            Non ci sono arbitri registrati nel sistema.
        </div>

        <!-- Tabella Arbitri Centrata -->
        <table class="stadium-table table-centered" th:unless="${#lists.isEmpty(arbitri)}">
            <thead>
                <tr>
                    <th>Codice AIA</th>
                    <th>Cognome</th>
                    <th>Nome</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="arbitro : ${arbitri}">
                    <td th:text="${arbitro.codiceAIA}">AIA-9999</td>
                    <td th:text="${arbitro.cognome}">Cognome</td>
                    <td th:text="${arbitro.nome}">Nome</td>
                    <td>
                        <div class="action-buttons-cell">
                            <a th:href="@{/arbitro/{id}(id=${arbitro.id})}" class="action-link-view">Visualizza</a>
                            
                            <!-- Eliminazione riservata all'ADMIN -->
                            <a sec:authorize="hasAuthority('ADMIN')" 
                               th:href="@{/admin/arbitro/{id}/delete(id=${arbitro.id})}" 
                               class="action-link-delete" 
                               onclick="return confirm('Sicuro di voler eliminare questo arbitro?');">Elimina</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

    </main>

</body>
</html>
