<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
	<head>
	    <title>Scheda Arbitro - SIWTornei</title>
	    <link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	
	<body>
	
	    <main class="main-content">
	        <div class="logo-container">
	            <div class="logo-placeholder">Arbitro</div>
	        </div>
	
	        <!-- Intestazione Scheda -->
	        <div class="team-header text-center">
	            <h1 th:text="${arbitro.nome} + ' ' + ${arbitro.cognome}">Nome Cognome</h1>
	            <p class="section-subtitle">Codice AIA: <span class="font-bold text-accent" th:text="${arbitro.codiceAIA}">AIA-12345</span></p>
	        </div>
	
	        <!-- Sezione Partite Arbitrate -->
	        <div class="margin-top-lg">
	            <h3>Partite Arbitrate</h3>
	            
	            <div th:if="${#lists.isEmpty(arbitro.partite)}" class="no-data-box">
	                Questo arbitro non ha ancora diretto nessuna partita nel torneo.
	            </div>
	
	            <table class="stadium-table" th:unless="${#lists.isEmpty(arbitro.partite)}">
	                <thead>
	                    <tr>
	                        <th>Stato / Risultato</th>
	                        <th>Incontro</th>
	                    </tr>
	                </thead>
	                <tbody>
	                    <tr th:each="partita : ${arbitro.partite}">
	                        <td class="text-center">
	                            <div class="score-badge">
	                                <span th:text="${partita.goalsHome}">0</span>
	                                <span class="score-divider">-</span>
	                                <span th:text="${partita.goalsAway}">0</span>
	                            </div>
	                        </td>
	                        <td>
	                            <span th:text="${partita.squadraCasa.nome}" class="font-bold">Squadra Casa</span>
	                            <span class="text-muted"> vs </span>
	                            <span th:text="${partita.squadraOspite.nome}" class="font-bold">Squadra Ospite</span>
	                        </td>
	                    </tr>
	                </tbody>
	            </table>
	        </div>
	
	        <div class="margin-top-lg text-center">
	            <a th:href="@{/arbitri}" class="back-link">Torna all'elenco arbitri</a>
	        </div>
	    </main>
	
	</body>
</html>
