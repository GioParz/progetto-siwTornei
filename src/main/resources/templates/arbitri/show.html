<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Scheda Arbitro - SIWTornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-right">
            <span sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="login-link">Accedi</a>
            </span>
            <span sec:authorize="isAuthenticated()" class="user-menu">
                <span class="welcome-user">Ciao, <strong sec:authentication="name">Utente</strong>!</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </span>
        </div>
    </div>

    <a th:href="@{/}" class="logo-wrapper">
        <img th:src="@{/images/logo.jpg}" alt="SIW Tornei Logo" class="logo-img">
    </a>

    <main class="main-content">
        <div>
            <div class="title-box">Profilo Direttore di Gara</div>
        </div>

        <!-- Box Riepilogo Arbitro -->
        <div class="info-box">
            <h2 class="section-title text-center" th:text="${arbitro.nome} + ' ' + ${arbitro.cognome}">
                Nome Cognome
            </h2>
            <p class="no-data-msg text-center">
                <strong>Codice AIA:</strong> <span th:text="${arbitro.codiceAIA}">AIA-12345</span>
            </p>
        </div>

        <!-- Sezione Partite Arbitrate -->
        <h2 class="section-title margin-top-xl">Elenco Match Diretti</h2>
            
        <div th:if="${#lists.isEmpty(arbitro.partite)}" class="no-data-msg">
            Questo arbitro non ha ancora diretto nessuna partita nel torneo.
        </div>

        <!-- Tabella Incontri Centrata -->
        <table class="stadium-table table-centered" th:unless="${#lists.isEmpty(arbitro.partite)}">
            <thead>
                <tr>
                    <th>Risultato</th>
                    <th>Incontro</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="partita : ${arbitro.partite}">
                    <td>
                        <span class="badge-completed">
                            <span th:text="${partita.goalsHome}">0</span> - <span th:text="${partita.goalsAway}">0</span>
                        </span>
                    </td>
                    <td>
                        <span th:text="${partita.squadraCasa != null ? partita.squadraCasa.nome : partita.squadraCasaNomeStorico}">Squadra Casa</span>
                        <span class="locked-text-muted"> vs </span>
                        <span th:text="${partita.squadraOspite != null ? partita.squadraOspite.nome : partita.squadraOspiteNomeStorico}">Squadra Ospite</span>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="margin-top-lg">
            <a th:href="@{/arbitri}" class="back-link">← Torna all'elenco arbitri</a>
        </div>
    </main>

</body>
</html>
