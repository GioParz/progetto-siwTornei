<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<title>Lista Squadre</title>
	</head>
	
	<body>
		
		<h1>Elenco Squadre</h1>
		
		<a th:href="@{/squadra/new}">Registra Nuova Squadra</a>
		<br><br>
		
		<table border="1">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nome</th>
					<th>Azioni</th>
				</tr>
			</thead>
			
			<tbody>
				<tr th:each="squadra : ${squadre}">
					<td th:text="${squadra.id}">ID fittizio</td>
					<td th:text="${squadra.nome}">Nome fittizio</td>
					<td>
						<a th:href="@{/squadra/{id}(id=${squadra.id})}">Visualizza</a>
						
						&nbsp;&nbsp;|&nbsp;&nbsp;
						
						<a th:href="@{/squadra/{id}/delete(id=${squadra.id})}"
						onclick="return confirm('Sei sicuro di voler eliminare questa squadra e tutti i suoi giocatori?');"
						style="color: red; font-weight: bold;">Elimina</a>
					</td>
				</tr>
			</tbody>
		</table>
		
	</body>
</html>
