<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<title th:text="${squadra.id != null} ? 'Modifica Squadra' : 'Nuova Squadra'">Gestione Squadra</title>
	</head>
	
	<body>
		
		<h1 th:text="${squadra.id != null} ? 'Modifica Squadra' : 'Inserisci Nuova Squadra'">Gestione Squadra</h1>
		
		<form th:action="${squadra.id != null} ? @{/admin/squadra/edit/{id}(id=${squadra.id})} : @{/admin/squadra/new}" 
			  th:object="${squadra}" method="post">
			
			<label>Nome del Club:</label>
			<input type="text" th:field="*{nome}" required />
			<br><br>
			
			<label>Anno di Fondazione:</label>
			<input type="number" th:field="*{annoFondazione}" required />
			<br><br>
			
			<label>Città:</label>
			<input type="text" th:field="*{citta}" required />
			<br><br>
			
			<button type="submit" th:text="${squadra.id != null} ? 'Salva Modifiche' : 'Registra Squadra'">Invia</button>
		</form>
		
		<br>
		<a th:href="@{/squadre}">Annulla e torna all'elenco delle squadre</a>
		
	</body>
</html>
