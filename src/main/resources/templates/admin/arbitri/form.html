<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	
	<head>
	    <title>Registra Arbitro - SIWTornei</title>
	    <link rel="stylesheet" th:href="@{/css/style.css}">
	</head>
	
	<body>
	
	    <div class="top-bar top-bar-admin">
	        <div class="top-bar-right">
	            <span class="welcome-user admin-text-highlight">PANNELLO AMMINISTRATORE</span>
	        </div>
	    </div>
	
	    <main class="main-content">
	        <div class="logo-container">
	            <div class="logo-placeholder logo-admin">Nuova Anagrafica</div>
	        </div>
	
	        <h2 class="text-center">Registrazione Nuovo Arbitro</h2>
	
	        <form th:action="@{/admin/arbitri}" th:object="${arbitro}" method="post" class="stadium-form">
	            
	            <div class="form-group">
	                <label>Nome</label>
	                <input type="text" th:field="*{nome}" placeholder="Inserisci il nome" required />
	            </div>
	            
	            <div class="form-group">
	                <label>Cognome</label>
	                <input type="text" th:field="*{cognome}" placeholder="Inserisci il cognome" required />
	            </div>
	            
	            <div class="form-group">
	                <label>Codice AIA</label>
	                <input type="text" th:field="*{codiceAIA}" placeholder="Es: AIA-54321" required />
	            </div>
	
	            <div class="margin-top-lg">
	                <button type="submit" class="main-link btn-admin">Registra Arbitro</button>
	            </div>
	        </form>
	
	        <div class="margin-top-lg">
	            <a th:href="@{/arbitri}" class="back-link">Annulla e torna alla lista</a>
	        </div>
	    </main>
	
	</body>
</html>
