<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Pannello Amministratore - SIWTornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Barra superiore Admin (Riga inferiore Rossa) -->
    <div class="top-bar admin-bar">
        <div class="top-bar-right">
            <span class="user-menu">
                <span class="welcome-user"><strong class="panel-admin-text">PANNELLO ADMIN</strong> (Ciao, <span sec:authentication="name">Admin</span>!)</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </span>
        </div>
    </div>

    <div class="logo-wrapper">
        <img th:src="@{/images/logo.jpg}" alt="SIW Tornei Logo" class="logo-img">
    </div>

    <!-- Contenuto operativo Admin -->
    <main class="main-content">
        <h1 class="welcome-text">Bentornato, ADMIN! Di cosa ci occupiamo oggi?</h1>

        <div class="buttons-container">
            <a th:href="@{/admin/torneo/new}" class="main-link admin-btn">+ Crea Nuovo Torneo</a>
            <a th:href="@{/admin/squadra/new}" class="main-link admin-btn">+ Inserisci Nuova Squadra</a>
            <a th:href="@{/admin/arbitro/new}" class="main-link admin-btn">+ Inserisci Nuovo Arbitro</a>
        </div>

        <div class="margin-top-lg">
            <a th:href="@{/}" class="back-link">← Torna alla Home pubblica</a>
        </div>
    </main>

</body>
</html>
