<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Inserisci Partita - SIWTornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <!-- Barra Superiore Admin -->
    <div class="top-bar admin-bar">
        <div class="top-bar-right">
            <span class="welcome-user"><strong class="panel-admin-text">PANNELLO ADMIN</strong></span>
        </div>
    </div>

    <a th:href="@{/}" class="logo-wrapper">
        <img th:src="@{/images/logo.jpg}" alt="SIW Tornei Logo" class="logo-img">
    </a>

    <main class="main-content">
        
        <!-- Box del Titolo centrato in stile rosso admin -->
        <div>
            <div class="title-box box-admin">Nuovo Match</div>
        </div>
		
		<div class="info-box">
			<div class="competition-badge-zone">
				<strong>Competizione:</strong>
				<span th:text="${partita.torneo.nome} + ' ' + ${partita.torneo.anno}">Nome Torneo</span>
			</div>
		</div>

        <form th:action="@{/partite}" th:object="${partita}" method="post" class="stadium-form">
            
            <input type="hidden" th:field="*{torneo}" />
				
            <!-- Messaggi di errore globali -->
            <div th:if="${#fields.hasGlobalErrors()}" class="error-msg">
                <ul class="no-margin">
                    <li th:each="err : ${#fields.globalErrors()}" th:text="${err}">Errore globale</li>
                </ul>
            </div>
            
            <div class="form-group">
                <label>Squadra Ospitante (In Casa)</label>
                <select th:field="*{squadraCasa}">
                    <option value="">Seleziona Club Casa</option>
                    <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}">Squadra Casa</option>
                </select>
                <span th:if="${#fields.hasErrors('squadraCasa')}" th:errors="*{squadraCasa}" class="field-error"></span>
            </div>
            
            <div class="form-group">
                <label>Squadra Sfidante (Ospite)</label>
                <select th:field="*{squadraOspite}">
                    <option value="">Seleziona Club Ospite</option>
                    <option th:each="s : ${squadre}" th:value="${s.id}" th:text="${s.nome}">Squadra Ospite</option>
                </select>
                <span th:if="${#fields.hasErrors('squadraOspite')}" th:errors="*{squadraOspite}" class="field-error"></span>
            </div>
            
            <div class="form-group">
                <label>Direttore di Gara (Arbitro)</label>
                <select th:field="*{arbitro}">
                    <option value="">Seleziona Arbitro</option>
                    <option th:each="a : ${arbitri}" th:value="${a.id}" th:text="${a.nome} + ' ' + ${a.cognome}">Arbitro</option>
                </select>
                <span th:if="${#fields.hasErrors('arbitro')}" th:errors="*{arbitro}" class="field-error"></span>
            </div>
            
            <div class="form-group">
                <label>Data e Ora d'Incontro</label>
                <input type="datetime-local" th:field="*{dataEOra}" />
                <span th:if="${#fields.hasErrors('dataEOra')}" th:errors="*{dataEOra}" class="field-error"></span>
            </div>
            
            <div class="form-group">
                <label>Stadio / Sede del Match</label>
                <input type="text" th:field="*{luogo}" placeholder="Es: Stadio Comunale" />
                <span th:if="${#fields.hasErrors('luogo')}" th:errors="*{luogo}" class="field-error"></span>
            </div>
            
            <div class="margin-top-lg">
                <button type="submit" class="main-link admin-btn">Pianifica Incontro</button>
            </div>
        </form>
        
        <div class="margin-top-lg">
            <a th:href="@{/torneo/{id}(id=${partita.torneo.id})}" class="back-link">Annulla e torna al torneo</a>
        </div>
    </main>

</body>
</html>
