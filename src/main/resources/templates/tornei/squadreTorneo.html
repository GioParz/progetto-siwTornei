<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Squadre Partecipanti - SIWTornei</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

    <div class="top-bar">
        <div class="top-bar-right">
            <span sec:authorize="isAnonymous()">
                <a th:href="@{/login}" class="login-link">Accedi</a>
            </span>
            <span sec:authorize="isAuthenticated()" class="user-menu">
                <span class="welcome-user">Ciao, <strong sec:authentication="name">Utente</strong>!</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Logout</button>
                </form>
            </span>
        </div>
    </div>

    <a th:href="@{/}" class="logo-wrapper">
        <img th:src="@{/images/logo.jpg}" alt="SIW Tornei Logo" class="logo-img">
    </a>

    <main class="main-content">
        <!-- Box centrale indicante il torneo specifico -->
        <div>
            <div class="title-box" th:text="'Iscritti: ' + ${torneo.nome}">Squadre Torneo</div>
        </div>

        <p th:if="${squadre.isEmpty()}" class="no-data-msg">Nessuna squadra ancora iscritta a questo torneo.</p>

        <!-- Tabella con i Club iscritti al Torneo selezionato -->
        <table class="stadium-table table-centered" th:if="${!squadre.isEmpty()}">
            <thead>
                <tr>
                    <th>Nome Club</th>
                    <th>Città</th>
                    <th>Azione</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="squadra : ${squadre}">
                    <td th:text="${squadra.nome}">Nome Squadra</td>
                    <td th:text="${squadra.citta}">Città</td>
                    <td>
                        <div class="action-buttons-cell">
                            <a th:href="@{/squadra/{id}(id=${squadra.id}, fromTorneo=${torneo.id})}" class="action-link-view">Dettagli Club</a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="margin-top-lg">
            <a th:href="@{/torneo/{id}(id=${torneo.id})}" class="back-link">← Torna al dettaglio del torneo</a>
        </div>
    </main>

</body>
</html>
